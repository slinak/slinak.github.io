<html>
	<title>Teddy's Haven Price Calculator</title>

	<body>
		<table>
			<tbody>
				<tr>
					<td>
						<label for="marketPrice">Market Price:</label>
					</td>
					<td>
						<input id="marketPrice" type="text"> </input>
					</td>
					<td>
						<button id="calculatePrice" onclick="calculateMaxPrice()">Calculate</button>
					</td>
				</tr>
				<tr>
					<td>
						<label for="">Likely Max Increase:</label>
					</td>
					<td>
						<input id="maxPriceIncrease" type="text" readonly></input>
					</td>
				</tr>
				<tr>			
					<td>
						<label for="maxPriceOutput">Suggested Price: </label>
					</td>
					<td>
						<div id="maxPriceOutput"/>
					</td>
				</tr>
			</tbody>
		</table>
		<p>
			Like the game?  Give it a review to help the developer. <a href="https://store.steampowered.com/app/3615160/Teddys_Haven__A_Fantasy_Inspired_Shop_Simulator/">Steam Page</a>
		</p>
	</body>
	<script>
		const input = document.getElementById("marketPrice");
		const btn = document.getElementById("calculatePrice");

		// Add a "keydown" listener to the input field
		input.addEventListener("keydown", function(event) {
		  // Check if the key pressed was "Enter"
		  if (event.key === "Enter") {
			// Cancel the default action, if needed
			event.preventDefault();
			// Trigger the button element with a click
			btn.click();
		  }
		});
		/*var submit = document.getElementById("calculator");
		
		submit.addEventListener("keydown", function(event) {
			if (event.key == "Enter") {
				event.preventDefault();
				document.getElementById("calculatePrice").click();
			}
		});*/
		function calculateMaxPrice() {
			let marketPrice = Number(document.getElementById("marketPrice").value);
			let adjustedPriceValue = (marketPrice * .078);
			document.getElementById("maxPriceIncrease").value = adjustedPriceValue;
			document.getElementById("maxPriceOutput").innerText = adjustedPriceValue + marketPrice;
		}
	</script>
</html>
